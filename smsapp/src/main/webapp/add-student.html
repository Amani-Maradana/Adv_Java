<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Student | Student Management System</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
 <header class="site-header">
   <div class="brand">Student Management System</div>
   <nav class="site-nav">
     <a href="index.html">Home</a>
     <a href="add-student.html">Add Student</a>
     <a href="list">View All</a>
     <a href="search-by-id.html">Search by ID</a>
     <a href="search-by-course.html">Search by Course</a>
     <a href="update-marks.html">Update Marks</a>
     <a href="delete-student.html">Delete</a>
   </nav>
 </header>
 <main class="container">
   <h1>Add Student</h1>
   <form class="form-card" action="add" method="post">
     <div class="form-group">
       <label for="name">Full Name</label>
       <input type="text" id="name" name="name" placeholder="e.g. Ananya Rao" required>
     </div>
     <div class="form-group">
       <label for="course">Course</label>
       <input type="text" id="course" name="course" placeholder="e.g. Java Full Stack" required>
     </div>
     <div class="form-group">
       <label for="marks">Marks (0-100)</label>
       <input type="number" id="marks" name="marks" min="0" max="100" step="0.1" placeholder="e.g. 87.5" required>
     </div>
     <div class="form-group">
       <label for="email">Email</label>
       <input type="email" id="email" name="email" placeholder="e.g. ananya@example.com" required>
     </div>
     <button type="submit" class="btn">Add Student</button>
   </form>
 </main>
 <footer class="site-footer">&copy; Student Management System &mdash; Servlets + JDBC</footer>
</body>
</html>
